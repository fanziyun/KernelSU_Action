name: Build Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - uses: actions/checkout@v4
    - name: Prepare Configuration
      run: |
        CONFIG_ENV=$(grep -w "CONFIG_ENV" config.env | head -n 1 | cut -d "=" -f 2)
        CONFIG_LIST=(
            KERNEL_SOURCE KERNEL_SOURCE_BRANCH KERNEL_CONFIG KERNEL_IMAGE_NAME
            ARCH ADD_LOCALVERSION_TO_FILENAME EXTRA_CMDS USE_CUSTOM_CLANG
            CUSTOM_CLANG_SOURCE CUSTOM_CLANG_BRANCH CUSTOM_CMDS CLANG_BRANCH
            CLANG_VERSION ENABLE_GCC_ARM64 ENABLE_GCC_ARM32 USE_CUSTOM_GCC_64
            CUSTOM_GCC_64_SOURCE CUSTOM_GCC_64_BRANCH CUSTOM_GCC_64_BIN
            USE_CUSTOM_GCC_32 CUSTOM_GCC_32_SOURCE CUSTOM_GCC_32_BRANCH
            CUSTOM_GCC_32_BIN ENABLE_KERNELSU KERNELSU_TAG ADD_KPROBES_CONFIG
            DISABLE-LTO DISABLE_LTO ADD_OVERLAYFS_CONFIG DISABLE_CC_WERROR 
            APPLY_KSU_PATCH USE_CUSTOM_ANYKERNEL3 CUSTOM_ANYKERNEL3_SOURCE 
            CUSTOM_ANYKERNEL3_BRANCH ENABLE_CCACHE NEED_DTBO BUILD_BOOT_IMG 
            SOURCE_BOOT_IMAGE KSU_EXPECTED_SIZE KSU_EXPECTED_HASH 
            REMOVE_UNUSED_PACKAGES SUSFS_REPO SUKISU_SETUP_URL
        )
        for CONFIG in "${CONFIG_LIST[@]}"; do
            VAL=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d "=" -f 2- | sed 's/^"//;s/"$//')
            echo "$CONFIG=$VAL" >> $GITHUB_ENV
        done

    - name: Remove unused packages
      if: env.REMOVE_UNUSED_PACKAGES == 'true'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev squashfs-tools pngcrush fontconfig schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libncurses-dev libx11-dev lib32z1-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang-aosp
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${{ env.CLANG_BRANCH }}/clang-${{ env.CLANG_VERSION }}.tar.gz
        tar -C clang-aosp/ -zxvf clang-${{ env.CLANG_VERSION }}.tar.gz

    - name: Download Source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1
        cd android-kernel
        
        # 核心逻辑：自动清理所有 Kconfig 中指向不存在路径的引用
        echo "Starting Kconfig repair..."
        find . -name "Kconfig" | while read -r kfile; do
            # 查找所有以 source 开头的行，并提取路径
            grep -E '^\s*source\s+"' "$kfile" | while read -r line; do
                # 提取双引号内的路径
                rel_path=$(echo "$line" | sed 's/.*source "\(.*\)".*/\1/')
                # 检查文件是否存在
                if [ ! -f "$rel_path" ]; then
                    echo "Removing broken reference in $kfile: $rel_path"
                    # 转义路径中的斜杠以便 sed 使用
                    escaped_path=$(echo "$line" | sed 's/[[*^$/\\]/\\&/g')
                    sed -i "\|$escaped_path|d" "$kfile"
                fi
            done
        done
        echo "Kconfig repair finished."
        
        # 特殊清理：删除可能导致错误的 localversion
        [ -f localversion ] && sed -i 's/+//g' localversion

    - name: Setup SukiSU
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "${{ env.SUKISU_SETUP_URL }}" | bash -s main
        echo "UPLOADNAME=-SukiSU_$(TZ=Asia/Shanghai date "+%H%M")" >> $GITHUB_ENV

    - name: Fetch and Apply SUSFS
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 -b gki-android14-6.1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
        cd android-kernel
        
        # 强行注入 fs/namespace.c 解决补丁冲突
        sed -i '30i #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux/susfs_def.h>\nextern bool susfs_is_current_ksu_domain(void);\nextern bool susfs_is_sdcard_android_data_decrypted __read_mostly;\n#define CL_COPY_MNT_NS BIT(25)\nstatic DEFINE_IDA(susfs_mnt_id_ida);\nstatic DEFINE_IDA(susfs_mnt_group_ida);\n#endif' fs/namespace.c
        
        cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ./
        cp -r ../susfs4ksu/kernel_patches/fs/* fs/
        cp -r ../susfs4ksu/kernel_patches/include/linux/* include/linux/
        patch -p1 --ignore-whitespace < 50_add_susfs_in_gki-android14-6.1.patch || true
        
        cd KernelSU
        cp ../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./
        patch -p1 < 10_enable_susfs_for_ksu.patch || true

    - name: Configure Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # 强制启用 Kprobes
        echo "CONFIG_KPROBES=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        echo "CONFIG_KPROBE_EVENTS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        # 写入 SUSFS 配置
        cat <<EOF >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        CONFIG_KSU=y
        CONFIG_SUSFS=y
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_EPHEMERAL_DIR=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        EOF

    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}
        max-size: 2G

    - name: Build
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        # 使用全套 LLVM 工具链以保证兼容性
        make -j$(nproc --all) CC="ccache clang" O=out ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1 ${{ env.KERNEL_CONFIG }}
        make -j$(nproc --all) CC="ccache clang" O=out ARCH=${{ env.ARCH }} LLVM=1 LLVM_IAS=1

    - name: Pack
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-SM8650-${{ env.BUILD_TIME }}
        path: |
          kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}
          kernel_workspace/AnyKernel3/*

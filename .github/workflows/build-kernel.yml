name: Build Kernel (SM8650 + SukiSU + SUSFS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load config.env
        run: |
          set -a
          source config.env
          set +a
          # 将需要的核心变量写入 GITHUB_ENV 供后续步骤使用
          echo "KERNEL_SOURCE=$KERNEL_SOURCE" >> $GITHUB_ENV
          echo "KERNEL_SOURCE_BRANCH=$KERNEL_SOURCE_BRANCH" >> $GITHUB_ENV
          echo "KERNEL_CONFIG=$KERNEL_CONFIG" >> $GITHUB_ENV
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "CLANG_BRANCH=$CLANG_BRANCH" >> $GITHUB_ENV
          echo "CLANG_VERSION=$CLANG_VERSION" >> $GITHUB_ENV
          echo "KERNELSU_TAG=$KERNELSU_TAG" >> $GITHUB_ENV
          echo "SUSFS_REPO=$SUSFS_REPO" >> $GITHUB_ENV
          echo "SUKISU_SETUP_URL=$SUKISU_SETUP_URL" >> $GITHUB_ENV

      - name: Prepare Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Fetch Toolchain (Clang)
        run: |
          mkdir -p toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b ${{ env.CLANG_BRANCH }} toolchain/clang

      - name: Fetch Kernel Source
        run: |
          mkdir -p kernel_workspace
          git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} kernel_workspace/android-kernel

      - name: Apply Hotfix (kernelFwUpdate Kconfig)
        working-directory: kernel_workspace/android-kernel
        run: |
          sed -i '/kernelFwUpdate/d' drivers/base/Kconfig

      - name: Inject SukiSU-Ultra
        working-directory: kernel_workspace/android-kernel
        run: |
          # 自动为 4.1.2 添加 'v' 前缀以匹配 tag
          if ! curl -LSs "${{ env.SUKISU_SETUP_URL }}" | bash -s "v${{ env.KERNELSU_TAG }}"; then
            echo "Failed to fetch SukiSU tag v${{ env.KERNELSU_TAG }}. Falling back to main..."
            curl -LSs "${{ env.SUKISU_SETUP_URL }}" | bash -s main
          fi

      - name: Fetch and Apply SUSFS
        working-directory: kernel_workspace/android-kernel
        run: |
          # 修复点：不再指定分支，直接拉取主分支
          git clone --depth=1 ${{ env.SUSFS_REPO }} ../susfs4ksu
          
          cp ../susfs4ksu/kernel_patches/5.15/susfs.patch .
          cp ../susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          
          # 应用补丁，如果冲突打印出冲突细节并中断
          patch -p1 < susfs.patch || { find . -name "*.rej" -print0 | xargs -0 cat; exit 1; }

      - name: Inject Configuration (SUSFS)
        working-directory: kernel_workspace/android-kernel
        run: |
          cat <<EOF >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
          CONFIG_KSU=y
          CONFIG_SUSFS=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_EPHEMERAL_DIR=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF

      - name: Compile Kernel
        working-directory: kernel_workspace/android-kernel
        run: |
          # 动态匹配你 env 中定义的 Clang 版本名 (r487747c -> clang-r487747c)
          export PATH=$GITHUB_WORKSPACE/toolchain/clang/clang-${{ env.CLANG_VERSION }}/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          
          make O=out ARCH=${{ env.ARCH }} CC=clang LLVM=1 LLVM_IAS=1 ${{ env.KERNEL_CONFIG }}
          make -j$(nproc) O=out ARCH=${{ env.ARCH }} CC=clang LLVM=1 LLVM_IAS=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image-SukiSU-SUSFS-SM8650
          path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image
